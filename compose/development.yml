services:
  backend:
    volumes:
      - ../backend/:/app
    environment:
      - NODE_ENV=development
      - RIS_TEST_DATA=2024-09-04_testdata_projects_updated.json
      - PURE_API_URL=http://backend:3000/dev-cris-api
      - JWT_SECRET=nosecret
      - JWT_EXPIRES_IN=10m

  frontend:
    volumes:
      - ../frontend/:/app
      - /app/node_modules/
    environment:
      - RIS_DEV_VALUE_PERSON=Person1-uuid-1234-abc
      - RIS_DEV_VALUE_ORGANIZATION=Org1-uuid-6789-xyz

    ports:
      - "3032:3000"
      - "24678:24678"
      - "9229:9229"
      - "51204:51204"
