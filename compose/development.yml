services:
  backend:
    volumes:
      - ../backend/:/app
    environment:
      - NODE_ENV=development
      - RIS_USE_DEV=2024-09-04_testdata_projects_updated.json

  frontend:
    volumes:
      - ../frontend/:/app
    environment:
      - RIS_DEV_VALUE_PERSON=Person1-uuid-1234-abc
      - RIS_DEV_VALUE_ORGANIZATION=Org1-uuid-6789-xyz

    ports:
      - "3032:3000"
      - "24678:24678"
