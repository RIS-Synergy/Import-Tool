name: Playwright e2e tests

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    concurrency: 1
    timeout-minutes: 5

    env:
      NODE_OPTIONS: --no-deprecation

    steps:
      - name: 🎁 Checkout repo
        uses: actions/checkout@v4

      - name: Print GITHUB_WORKSPACE folder
        run: |
          echo === GITHUB_WORKSPACE =======
          echo ${GITHUB_WORKSPACE:-.}
          echo ============================

      - name: ☕ Build Backend Image
        run: |
          docker build \
            --tag my-ci-test-backend \
            --file ./backend/Dockerfile.ci \
            ${GITHUB_WORKSPACE:-.}/backend

      - name: 🧪 Build Frontend Image
        run: |
          docker build \
            --tag my-ci-test-frontend \
            ${GITHUB_WORKSPACE:-.}/frontend

      - name: ⚽ Build Playwright Image
        run: |
          docker build \
            --tag my-ci-test-playwright \
            --file ./frontend/Dockerfile.ci \
            ${GITHUB_WORKSPACE:-.}/frontend

      - name: 🚀 Start All Services From Pre-built Images (not playwright)
        run: |
          docker compose -f docker-compose.ci.yml -p my-ci-test --env-file env-test \
          up db backend frontend -d --no-build

      - name: 🗄️ Initialize Test Database
        run: |
          docker compose -f docker-compose.ci.yml -p my-ci-test --env-file env-test \
          exec backend yarn prisma migrate deploy || true
          docker compose -f docker-compose.ci.yml -p my-ci-test --env-file env-test \
          exec backend npm run db-init || true

      - name: ▶️ Run Playwright tests
        run: |
          docker compose -f docker-compose.ci.yml -p my-ci-test --env-file env-test \
          run playwright yarn playwright:ci

      - name: 📄 Copy Playwright report from container
        if: always()
        run: |
          # Get the last container created for this service (even if exited)
          CONTAINER_ID=$(docker ps -aqf "name=my-ci-test-playwright-run" | tail -n 1)
          echo "Playwright container ID: $CONTAINER_ID"

          # Copy the report from the container to the host
          docker cp $CONTAINER_ID:/app/frontend/.playwright-ci ./frontend/.playwright-ci || true

      - name: 💾 Save Backend Logs
        if: always()
        run: |
          docker compose -p my-ci-test logs backend > backend-logs.txt

      - name: 💾 Save Frontend Logs on Failure
        if: always()
        run: |
          docker compose -p my-ci-test logs frontend > ./frontend/frontend-logs.txt 2>&1

      - name: 📁 Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/.playwright-ci/index.html
          retention-days: 30

      - name: 📁 Upload Backend Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: backend-logs.txt
          retention-days: 30

      - name: 📁 Upload Frontend Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-log
          path: frontend/frontend-logs.txt
          retention-days: 30

      - name: Stop services
        if: always()
        run: |
          docker compose -f docker-compose.ci.yml -p my-ci-test down
          docker rm -f $(docker ps -a -qf "name=my-ci-test-playwright-run")
