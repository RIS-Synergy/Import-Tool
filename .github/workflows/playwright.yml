name: Playwright Tests

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  test:
    runs-on: ubuntu-latest
    concurrency: 1
    timeout-minutes: 5

    env:
      NODE_OPTIONS: --no-deprecation

    steps:
      - name: 🎁 Checkout repo
        uses: actions/checkout@v4

      - name: 🚀 Start All Services From Pre-built Images
        run: >
          docker compose -f docker-compose.ci.yml -p my-ci-test --env-file env-test
          up -d

      - name: ▶️ Run Playwright tests
        run: >
          docker compose -f docker-compose.ci.yml -p my-ci-test --env-file env-test
          run --rm playwright

      - name: 📁 Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frontend/tests/test-results/
          retention-days: 30

      - name: 💾 Save Frontend Logs on Failure
        if: failure()
        run: |
          docker logs frontend-ci > fontend/tests/test-results/frontend-logs.txt 2>&1

      - name: Stop services
        if: always()
        run: >
          docker compose -f docker-compose.ci.yml -p my-ci-test
          down
