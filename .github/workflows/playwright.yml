name: Playwright Tests

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.54.0-noble
    concurrency: 1
    timeout-minutes: 10

    defaults:
      run:
        working-directory: ./frontend

    # Silence Node deprecation warnings globally for the job
    env:
      NODE_OPTIONS: --no-deprecation

    steps:
      - name: 🎁 Checkout repo
        uses: actions/checkout@v4

      # ----------------------------------------------------
      # 1️⃣  Install Node & enable Yarn cache (automatic)
      # ----------------------------------------------------
      - name: 📦 Setup Node & Yarn cache
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn
          cache-dependency-path: ./frontend/yarn.lock

      # ----------------------------------------------------
      # 2️⃣  Install packages (frozen lockfile guarantees consistency)
      # ----------------------------------------------------
      - name: 📥 Install dependencies
        run: yarn install --frozen-lockfile

      # ----------------------------------------------------
      # 3️⃣  Run Playwright tests **and** generate an HTML report
      # ----------------------------------------------------
      - name: 🧪 Run Playwright tests & build report
        # The `--reporter html` flag tells Playwright to emit
        # a directory called `playwright-report` at the
        # repository root (relative to the working dir).
        run: npm run playwright:ci

      # ----------------------------------------------------
      # 4️⃣  Upload the report as an artifact
      # ----------------------------------------------------
      - name: 📁 Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frontend/tests/test-results/
          retention-days: 30
