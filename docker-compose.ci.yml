# we have to remove the backend yarn dev PORT 3001,
# best to have 3000 for everyone

services:
  db:
    container_name: db-ci
    image: postgres:16.3-alpine3.20
    environment:
      POSTGRES_DB: ris_db_test
      POSTGRES_USER: ris-user
      POSTGRES_PASSWORD: test-password
    ports:
      - 6432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ris-user -d ris_db_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    container_name: backend-ci
    image: my-ci-test-backend
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - 4001:3001
    environment:
      - NODE_ENV=ci
      - DATABASE_URL=postgresql://ris-user:test-password@db-ci:5432/ris_db_test?schema=public
      - JWT_SECRET=jwt-password
      - JWT_EXPIRES_IN=1h
      - FA_SYNC_TIME=1h
      - RIS_TEST_DATA=2024-09-04_testdata_projects_updated.json
      # - RIS_MEMBER_ID='FWF_Test' # this is definately unelegant that we need this parameter
      - PURE_API_URL="http://backend:3001/test-cris-api"

  frontend:
    container_name: frontend-ci
    image: my-ci-test-frontend
    working_dir: /app
    ports:
      - 4000:3000
    environment:
      BACKEND_API_PROXY: http://backend-ci:3001/**

  playwright:
    container_name: playwright-ci
    image: my-ci-test-playwright
    depends_on:
      - frontend
    volumes:
      - ${GITHUB_WORKSPACE:-.}:/app
      - ./frontend/playwright-report:/app/frontend/playwright-report
      - /app/frontend/node_modules # The "Mask": Covers the node_modules part of the window
    working_dir: /app/frontend
    environment:
      - NODE_ENV=ci
      - PLAYWRIGHT_BASE_URL=http://frontend-ci:3000
      - PLAYWRIGHT_HTML_OUTPUT_DIR=/app/frontend/.playwright-ci
      - PLAYWRIGHT_OUTPUT_DIR=/app/frontend/.playwright-ci
      - CI_TIME_DELAY=7 # prevent errors when the runner (GitHub Actions) is slow
