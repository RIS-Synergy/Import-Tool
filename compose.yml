services:
  db:
    image: postgres:16.3-alpine3.20
    ports:
      - 3032:5432

    shm_size: 128mb # set shared memory limit when using docker-compose

    volumes:
      - ${RIS_DATA_VOLUME}:/var/lib/postgresql/data

    environment:
      POSTGRES_USER: ris-user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ris_db

  frontend:
    build:
      context: ./frontend
      # dockerfile: ./frontend/Dockerfile
    # restart: always
    container_name: ris-frontend
    volumes:
      - ./frontend/:/app
    ports:
      - "3005:3000"
      - "24678:24678"
    # command: sh -c "npm install && yarn dev -- --host 0.0.0.0"
    # environment:
      # - NODE_ENV=developmen
