services:
  db:
    image: postgres:16.3-alpine3.20
    container_name: ris-db
    ports:
      - 3030:5432

    shm_size: 128mb # set shared memory limit when using docker-compose

    volumes:
      - ${RIS_DATA_VOLUME}:/var/lib/postgresql/data

    environment:
      POSTGRES_USER: ris-user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ris_db

  backend:
    build:
      context: ./backend
    container_name: ris-backend
    volumes:
      - ./backend/:/app
    ports:
      - "3031:3001"

  frontend:
    build:
      context: ./frontend
    container_name: ris-frontend
    volumes:
      - ./frontend/:/app
    ports:
      - "3032:3000"
      - "24678:24678"
