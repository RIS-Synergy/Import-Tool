# This is for development!
#
# Run it like this:
#
# docker compose up --build -d
#
# Production would compose the main file, followed by another yaml file:
#
# docker compose -f compose.yaml -f compose.prod.yaml up --build -d

services:
  backend:
    build:
      target: development
    volumes:
      - ./backend/:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - JWT_SECRET=nosecret
      - RIS_REGISTRY_URL=https://forschungsdaten.at/registry/registry.json
      - RIS_MEMBER_ID=FWF_Test
      - LOKI_HOST=${LOKI_HOST}
      - VITEST_COVERAGE__REPORTSDIRECTORY=./tests/.coverage
    ports:
      - "3031:3001"   # the backend itself
      - "51204:51204" # vitest, incl. UI
      - "3029:9229"   # debugger

  frontend:
    environment:
      - BACKEND_API_PROXY="http://backend:3001/**"
      - DEV_TOOLS=${DEV_TOOLS}
    ports:
      - "3032:3000"
      - "24678:24678"
      - "9229:9229"
    volumes:
      - ./frontend/:/app
      - /app/node_modules
      - /app/.nuxt
