# This is for development!
#
# Run it like this:
#
# docker compose up --build -d
#
# Production would compose the main file, followed by another yaml file:
#
# docker compose -f compose.yaml -f compose.prod.yaml up --build -d

services:
  backend:
    build:
      target: development
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./backend/:/app
    environment:
      - NODE_ENV=development
      - JWT_SECRET=nosecret
      - RIS_REGISTRY_URL=https://api.forschungsdaten.at/registry.json
      - RIS_MEMBER_ID=FWF_Test
      - LOKI_HOST=${LOKI_HOST}
      - VITEST_COVERAGE__REPORTSDIRECTORY=./tests/.coverage
    ports:
      - "3031:3001"   # the backend itself
      - "51204:51204" # vitest, incl. UI
      - "3029:9229"   # debugger

  frontend:
    build:
      target: development
    user: "${UID:-1000}:${GID:-1000}"
    env_file:
      - ./frontend/.env.dev
    environment:
      - BACKEND_API_PROXY=http://backend:3001
      - DEV_TOOLS=${DEV_TOOLS}
      - NUXT_OIDC_PROVIDERS_KEYCLOAK_BASE_URL=${NUXT_OIDC_PROVIDERS_KEYCLOAK_BASE_URL}
      - NUXT_OIDC_PROVIDERS_KEYCLOAK_CLIENT_ID=${NUXT_OIDC_PROVIDERS_KEYCLOAK_CLIENT_ID}
      - NUXT_OIDC_PROVIDERS_KEYCLOAK_CLIENT_SECRET=${NUXT_OIDC_PROVIDERS_KEYCLOAK_CLIENT_SECRET}
      - NUXT_OIDC_PROVIDERS_KEYCLOAK_REDIRECT_URI=${NUXT_OIDC_PROVIDERS_KEYCLOAK_REDIRECT_URI}
      - NUXT_OIDC_SESSION_SECRET=${NUXT_OIDC_SESSION_SECRET}
      - NUXT_OIDC_TOKEN_KEY=${NUXT_OIDC_TOKEN_KEY}
      - NUXT_OIDC_AUTH_SESSION_SECRET=${NUXT_OIDC_AUTH_SESSION_SECRET}
    ports:
      - "3000:3000"
      - "24678:24678"
      - "9229:9229"
    volumes:
      - ./frontend/:/app
